---
# production-k3s-setup.yml
# Production k3s cluster where master runs workloads and can add workers

- name: Prepare All Nodes
  hosts: all
  become: yes
  tasks:
    - name: Clean package locks
      shell: |
        pkill -f "apt|dpkg|unattended" || true
        rm -f /var/lib/dpkg/lock* /var/cache/apt/archives/lock
        dpkg --configure -a
      ignore_errors: yes

    - name: Install essential packages
      apt:
        name:
          - curl
          - wget
          - git
          - htop
          - net-tools
        state: present
        update_cache: yes

    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Disable swap permanently
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Disable swap immediately
      command: swapoff -a

- name: Setup k3s Master
  hosts: masters
  become: yes
  vars:
    k3s_version: v1.28.3+k3s2

  tasks:
    - name: Check if k3s exists
      stat:
        path: /usr/local/bin/k3s
      register: k3s_exists

    - name: Install k3s server (master can run workloads)
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -s - server \
          --write-kubeconfig-mode 644 \
          --cluster-init \
          --disable traefik \
          --disable servicelb
      when: not k3s_exists.stat.exists

    - name: Wait for k3s to be ready
      wait_for:
        port: 6443
        timeout: 300

    - name: Verify k3s service is running
      systemd:
        name: k3s
        state: started
        enabled: yes

    - name: Create kubectl symlink
      file:
        src: /usr/local/bin/k3s
        dest: /usr/local/bin/kubectl
        state: link

    - name: Get node token for workers
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Create .kube directory for user
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Copy kubeconfig for user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Add kubectl aliases for user
      lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: "{{ item }}"
        create: yes
      loop:
        - "alias k='kubectl'"
        - "export KUBECONFIG=~/.kube/config"

    - name: Verify cluster is operational
      shell: k3s kubectl get nodes
      register: cluster_status
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Verify master can schedule workloads
      shell: k3s kubectl describe node {{ inventory_hostname }} | grep -E "Taints:|taints" || echo "No taints - master can schedule workloads"
      register: taint_check
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Setup k3s Workers
  hosts: workers
  become: yes
  tasks:
    - name: Get master connection info
      set_fact:
        master_ip: "{{ hostvars[groups['masters'][0]]['ansible_default_ipv4']['address'] }}"
        node_token: "{{ hostvars[groups['masters'][0]]['node_token']['content'] | b64decode | trim }}"
      when: groups['workers'] is defined and inventory_hostname in groups['workers']

    - name: Check if k3s agent exists
      stat:
        path: /usr/local/bin/k3s
      register: k3s_agent_exists
      when: groups['workers'] is defined and inventory_hostname in groups['workers']

    - name: Install k3s agent
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ master_ip }}:6443 K3S_TOKEN={{ node_token }} sh -
      when:
        - groups['workers'] is defined
        - inventory_hostname in groups['workers']
        - not k3s_agent_exists.stat.exists

    - name: Verify k3s agent is running
      systemd:
        name: k3s-agent
        state: started
        enabled: yes
      when: groups['workers'] is defined and inventory_hostname in groups['workers']

- name: Install Production Components
  hosts: masters[0]
  become: yes
  tasks:
    - name: Wait for cluster to be ready
      shell: k3s kubectl get nodes --no-headers | grep -c Ready
      register: ready_nodes
      until: ready_nodes.stdout|int >= 1
      retries: 20
      delay: 15
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install nginx ingress controller
      shell: |
        k3s kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.1/deploy/static/provider/baremetal/deploy.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for ingress controller to be ready
      shell: k3s kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      ignore_errors: yes

    - name: Install cert-manager CRDs
      shell: |
        k3s kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.2/cert-manager.crds.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Add cert-manager Helm repository
      shell: |
        helm repo add jetstack https://charts.jetstack.io
        helm repo update
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Install cert-manager
      shell: |
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager \
          --create-namespace \
          --version v1.13.2
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Create Management Tools
  hosts: masters[0]
  become: no
  tasks:
    - name: Create cluster management script
      copy:
        content: |
          #!/bin/bash
          # k3s-cluster.sh - Production k3s cluster management

          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          RED='\033[0;31m'
          NC='\033[0m'

          MASTER_IP="{{ ansible_default_ipv4.address }}"

          show_status() {
              echo -e "${BLUE}=== k3s Production Cluster Status ===${NC}"
              echo "Master: $MASTER_IP"
              echo ""
              
              echo "🖥️  Nodes:"
              kubectl get nodes -o wide
              echo ""
              
              echo "📊 Resource Usage:"
              kubectl top nodes 2>/dev/null || echo "Metrics server not available"
              echo ""
              
              echo "🏃 System Pods:"
              kubectl get pods -n kube-system
              echo ""
              
              echo "🌐 Ingress Controller:"
              kubectl get pods -n ingress-nginx
              echo ""
              
              echo "🔒 Cert Manager:"
              kubectl get pods -n cert-manager
          }

          show_cluster_info() {
              echo -e "${BLUE}=== Cluster Information ===${NC}"
              echo "Type: k3s (Production Kubernetes)"
              echo "Master: $MASTER_IP:6443"
              echo "Master scheduling: Enabled"
              echo "Ingress: nginx (NodePorts 30080/30443)"
              echo "Certificates: cert-manager"
              echo ""
              echo "Current nodes: $(kubectl get nodes --no-headers | wc -l)"
              echo ""
              kubectl get nodes -o custom-columns=NAME:.metadata.name,STATUS:.status.conditions[4].status,ROLES:.metadata.labels.node-role\\.kubernetes\\.io/master,VERSION:.status.nodeInfo.kubeletVersion
          }

          add_worker() {
              echo -e "${YELLOW}➕ Adding Worker Node${NC}"
              echo "Run this command on the worker machine:"
              echo "======================================="
              echo "curl -sfL https://get.k3s.io | K3S_URL=https://$MASTER_IP:6443 K3S_TOKEN=\$(sudo cat /var/lib/rancher/k3s/server/node-token) sh -"
              echo ""
              echo "After joining, the worker will automatically:"
              echo "• Accept workloads alongside the master"
              echo "• Participate in load balancing"
              echo "• Show up in 'kubectl get nodes'"
          }

          backup_cluster() {
              BACKUP_DIR="/home/{{ ansible_user }}/k3s-backups/$(date +%Y%m%d-%H%M%S)"
              echo -e "${YELLOW}💾 Creating cluster backup${NC}"
              mkdir -p "$BACKUP_DIR"
              
              # Backup cluster state
              kubectl get all --all-namespaces -o yaml > "$BACKUP_DIR/cluster-resources.yaml"
              kubectl get pv,pvc,storageclass -o yaml > "$BACKUP_DIR/storage.yaml"
              kubectl get configmaps,secrets --all-namespaces -o yaml > "$BACKUP_DIR/configs-secrets.yaml"
              kubectl get ingress --all-namespaces -o yaml > "$BACKUP_DIR/ingress.yaml"
              kubectl get crd -o yaml > "$BACKUP_DIR/crds.yaml"
              
              # Backup k3s data
              sudo cp -r /var/lib/rancher/k3s "$BACKUP_DIR/" 2>/dev/null || echo "Note: k3s data backup requires root"
              
              echo -e "${GREEN}✅ Backup completed: $BACKUP_DIR${NC}"
          }

          show_logs() {
              echo -e "${BLUE}📋 k3s Service Logs${NC}"
              echo "Press Ctrl+C to exit"
              sudo journalctl -u k3s -f
          }

          restart_service() {
              echo -e "${YELLOW}🔄 Restarting k3s service${NC}"
              sudo systemctl restart k3s
              echo "Waiting for cluster to be ready..."
              sleep 10
              kubectl wait --for=condition=ready node --all --timeout=120s
              echo -e "${GREEN}✅ k3s restarted${NC}"
          }

          case "$1" in
              status)
                  show_status
                  ;;
              info)
                  show_cluster_info
                  ;;
              add-worker)
                  add_worker
                  ;;
              backup)
                  backup_cluster
                  ;;
              restart)
                  restart_service
                  ;;
              logs)
                  show_logs
                  ;;
              *)
                  echo "k3s Production Cluster Management"
                  echo "================================"
                  echo ""
                  echo "Usage: $0 <command>"
                  echo ""
                  echo "Commands:"
                  echo "  status       Show comprehensive cluster status"
                  echo "  info         Show cluster configuration"
                  echo "  add-worker   Get command to add worker nodes"
                  echo "  backup       Create complete cluster backup"
                  echo "  restart      Restart k3s service"
                  echo "  logs         Show k3s service logs"
                  echo ""
                  echo "Production Features:"
                  echo "• Master node runs workloads (max resource utilization)"
                  echo "• nginx ingress controller (external access)"
                  echo "• cert-manager (automatic SSL certificates)"
                  echo "• Helm package manager"
                  echo "• Ready for worker node expansion"
                  echo ""
                  ;;
          esac
        dest: "/home/{{ ansible_user }}/k3s-cluster.sh"
        mode: "0755"
        owner: "{{ ansible_user }}"

    - name: Create production deployment template
      copy:
        content: |
          # Example production deployment template
          # Replace with your actual application

          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: my-app
            namespace: default
            labels:
              app: my-app
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: my-app
            template:
              metadata:
                labels:
                  app: my-app
              spec:
                containers:
                - name: app
                  image: your-registry/your-app:latest
                  ports:
                  - containerPort: 8080
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "500m"
                  env:
                  - name: ENV
                    value: "production"
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 8080
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 8080
                    initialDelaySeconds: 5
                    periodSeconds: 5
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: my-app-service
            namespace: default
          spec:
            selector:
              app: my-app
            ports:
            - protocol: TCP
              port: 80
              targetPort: 8080
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: my-app-ingress
            namespace: default
            annotations:
              kubernetes.io/ingress.class: nginx
              cert-manager.io/cluster-issuer: letsencrypt-prod
          spec:
            tls:
            - hosts:
              - your-domain.com
              secretName: my-app-tls
            rules:
            - host: your-domain.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: my-app-service
                      port:
                        number: 80
        dest: "/home/{{ ansible_user }}/production-app-template.yaml"
        owner: "{{ ansible_user }}"

    - name: Create cluster monitoring setup
      copy:
        content: |
          #!/bin/bash
          # install-monitoring.sh - Install production monitoring stack

          echo "Installing Prometheus monitoring stack..."

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          # Install with production settings
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            --set prometheus.prometheusSpec.retention=30d \
            --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=20Gi \
            --set grafana.persistence.enabled=true \
            --set grafana.persistence.size=10Gi \
            --set grafana.adminPassword=admin \
            --set alertmanager.alertmanagerSpec.storage.volumeClaimTemplate.spec.resources.requests.storage=10Gi

          echo ""
          echo "Monitoring stack installed!"
          echo "Access Grafana at: kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:80"
          echo "Default credentials: admin/admin"
        dest: "/home/{{ ansible_user }}/install-monitoring.sh"
        mode: "0755"
        owner: "{{ ansible_user }}"

    - name: Display production setup completion
      debug:
        msg: |
          🚀 Production k3s Cluster Ready!

          ✅ Master node can run workloads (production efficient)
          ✅ nginx ingress controller installed
          ✅ cert-manager for SSL certificates
          ✅ Helm package manager
          ✅ Ready for production workloads

          Master: {{ ansible_default_ipv4.address }}:6443

          Management:
          • SSH: ssh {{ ansible_user }}@{{ ansible_default_ipv4.address }}
          • Status: ./k3s-cluster.sh status
          • Add workers: ./k3s-cluster.sh add-worker
          • Backup: ./k3s-cluster.sh backup

          Production Ready Features:
          • Ingress: External access via NodePorts 30080/30443
          • SSL: Automatic certificates with cert-manager
          • Monitoring: ./install-monitoring.sh (optional)
          • Templates: production-app-template.yaml

          Your production k3s cluster is ready for workloads! 🏭
