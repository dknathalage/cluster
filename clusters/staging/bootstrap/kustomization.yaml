apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit base bootstrap components
resources:
  - ../../base/bootstrap
  - gotk-sync.yaml

# Cluster-specific configuration
namespace: flux-system

# Example: Override URL for staging cluster
patches:
  - target:
      kind: GitRepository
      name: flux-system
    patch: |
      - op: replace
        path: /spec/url
        value: https://github.com/dknathalage/cluster
      - op: replace
        path: /spec/ref/branch
        value: staging 